name: Build Surface Kernel

on:
  push:
    branches: [main]
    paths:
      - 'hosts/surface/**'
      - 'flake.nix'
      - 'flake.lock'
      - 'hardware/**'
  pull_request:
    paths:
      - 'hosts/surface/**'
      - 'flake.nix'
      - 'flake.lock'
      - 'hardware/**'
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Cache Nix store
        uses: actions/cache@v4
        with:
          path: /nix/store
          key: nix-store-surface-kernel-${{ hashFiles('flake.lock') }}
          restore-keys: |
            nix-store-surface-kernel-

      - name: Build Surface kernel
        run: |
          nix build .#nixosConfigurations.surface.config.boot.kernelPackages.kernel \
            --print-build-logs \
            --show-trace

      - name: Show kernel info
        if: success()
        run: |
          nix eval .#nixosConfigurations.surface.config.boot.kernelPackages.kernel.version
          ls -lh result/

      - name: Upload kernel artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: surface-kernel
          path: result/
          retention-days: 7
